<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATP Vehicle Management</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<h1>🚗 ATP Vehicle Management</h1>


<div class="stats">

<div class="card green">
<span id="workingCount">0</span>
<small>تعمل</small>
</div>


<div class="card red">
<span id="faultCount">0</span>
<small>أعطال</small>
</div>


<div class="card yellow">
<span id="absenceCount">0</span>
<small>غياب</small>
</div>


</div>



<input 
id="search"
type="text"
placeholder="ابحث برقم المركبة..."
>


</header>





<main>


<div class="categories">



<section class="category">

<h2>PRIVATE</h2>

<div id="privateList" class="vehicle-list"></div>

</section>




<section class="category">

<h2>TRUCKS</h2>

<div id="truckList" class="vehicle-list"></div>

</section>




<section class="category">

<h2>EQUIPMENTS</h2>

<div id="equipmentList" class="vehicle-list"></div>

</section>



</div>


</main>






<!-- نافذة المركبة -->


<div id="popup" class="popup hidden">


<div class="popup-box">


<h2 id="vehicleTitle"></h2>



<button onclick="requestStatusChange('working')">
✅ تعمل
</button>



<button onclick="requestStatusChange('fault')">
❌ لا تعمل
</button>



<button onclick="requestStatusChange('absence')">
👤 غياب
</button>



<button class="close" onclick="closeVehiclePopup()">
إغلاق
</button>



</div>


</div>







<!-- نافذة الرقم السري -->


<div id="passwordPopup" class="popup hidden">


<div class="popup-box">


<h2>
🔐 صلاحية المشرف
</h2>



<input 
id="passwordInput"
type="password"
placeholder="أدخل الرقم السري"
>



<button onclick="checkPassword()">
دخول
</button>



<button class="close" onclick="closePassword()">
إلغاء
</button>


</div>


</div>







<script src="data.js"></script>

<script src="script.js"></script>


</body>

</html>
