<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATP Vehicle Management</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    text-align:center;
    padding:30px;
}

.box{
    background:white;
    max-width:400px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

.vehicle{
    font-size:40px;
    color:#0a66c2;
    margin:20px;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    font-size:18px;
}
</style>

</head>

<body>

<div class="box">

<h2>ATP Vehicle Management</h2>

<h3>رقم المركبة</h3>

<div class="vehicle" id="carNumber"></div>

<button>🟢 تعمل</button>

<button>🔴 لا تعمل</button>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const id=params.get("id");

document.getElementById("carNumber").innerHTML=id;

</script>

</body>
</html>
