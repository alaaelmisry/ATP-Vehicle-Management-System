<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ATP Vehicle Management</title>

<style>

body{
    margin:0;
    background:#f2f2f2;
    font-family:Arial;
}

.box{
    width:90%;
    max-width:400px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px #ccc;
    text-align:center;
}

.vehicle{
    font-size:55px;
    color:#0A66C2;
    margin:25px 0;
}

button{
    width:100%;
    padding:15px;
    font-size:22px;
    margin-top:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.green{
    background:#27ae60;
    color:white;
}

.red{
    background:#e74c3c;
    color:white;
}

#faultBox{
    display:none;
    margin-top:15px;
}

textarea{
    width:100%;
    height:90px;
    font-size:18px;
}

#saveBtn{
    display:none;
    background:#0A66C2;
    color:white;
}

</style>

</head>

<body>

<div class="box">

<h1>ATP Vehicle Management</h1>

<h2>رقم المركبة</h2>

<div class="vehicle" id="carNumber"></div>

<button class="green" onclick="working()">
🟢 تعمل
</button>

<button class="red" onclick="notWorking()">
🔴 لا تعمل
</button>

<div id="faultBox">

<textarea id="notes"
placeholder="اكتب وصف العطل هنا"></textarea>

</div>

<button id="saveBtn" onclick="saveData()">
💾 حفظ
</button>

</div>

<script>

const params=new URLSearchParams(window.location.search);

const id=params.get("id");

document.getElementById("carNumber").innerHTML=id;

let status="";

function working(){

status="تعمل";

document.getElementById("faultBox").style.display="none";

document.getElementById("saveBtn").style.display="block";

}

function notWorking(){

status="لا تعمل";

document.getElementById("faultBox").style.display="block";

document.getElementById("saveBtn").style.display="block";

}

function saveData(){

alert("✅ تم تسجيل بدء العمل بنجاح");

}

</script>

</body>

</html>
