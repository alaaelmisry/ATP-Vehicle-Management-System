<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>ATP Vehicle Management</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>🚗 ATP Vehicle Management</h1>

<div class="topButtons">

<button id="adminBtn">
دخول المشرف
</button>

<button id="addBtn" style="display:none;">
➕ إضافة صف
</button>

</div>

</header>

<div class="tableContainer">

<table id="vehicleTable">

<thead>

<tr>

<th>مسلسل</th>

<th>اللوحة</th>

<th>المفوض</th>

<th>الحالة</th>

<th>عرض التفاصيل</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<!-- نافذة تسجيل دخول المشرف -->

<div id="loginBox" class="modal">

<div class="modalContent">

<h2>دخول المشرف</h2>

<input
type="password"
id="adminPassword"
placeholder="أدخل الرقم السري">

<div class="modalButtons">

<button onclick="login()">
دخول
</button>

<button onclick="closeLogin()">
إلغاء
</button>

</div>

</div>

</div>

<!-- نافذة إضافة صف -->

<div id="addBox" class="modal">

<div class="modalContent">

<h2>إضافة مركبة</h2>

<input
type="text"
id="plate"
placeholder="رقم اللوحة">

<input
type="text"
id="driver"
placeholder="اسم المفوض">

<select id="status">

<option>تعمل</option>

<option>لا تعمل</option>

</select>

<div class="modalButtons">

<button onclick="saveVehicle()">
حفظ
</button>

<button onclick="closeAdd()">
إلغاء
</button>

</div>

</div>

</div>

<script type="module" src="firebase.js"></script>

<script src="script.js"></script>

</body>

</html>
